<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <style>
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .hero img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }

        .hero p {
            font-size: 1.2rem;
            color: #f0f0f0;
            margin-bottom: 30px;
            max-width: 600px;
            font-family: Arial, sans-serif;
        }

        .hero a {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ff6b6b;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
        }

        .hero a:hover {
            background-color: #ff5252;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=600&fit=crop" alt="Mountain landscape">
        <h1>Discover Your Next Adventure</h1>
        <p>Explore breathtaking destinations and create unforgettable memories with our exclusive travel packages.</p>
        <a href="#">Explore Now</a>
    </div>
</body>
</html>
